name: Deploy

# Runs on push to main. Vercel's GitHub integration performs the PRODUCTION
# deploy automatically and IN PARALLEL with this workflow, so there is
# intentionally NO deploy job here. This workflow only owns the two things the
# Vercel integration does NOT do: run DB migrations and smoke-test the live site.
#
# NOTE: if the Supabase GitHub integration is enabled it already does
# clone -> pull migrations -> health checks -> migrate on push. In that case the
# `migrate` job below is redundant and should be disabled to avoid double-apply.
on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    env:
      # Direct connection (session port 5432), NOT the transaction pooler.
      # Migrations create tables, enable RLS and create policies, so they need a
      # privileged direct connection. db/migrate.ts reads DATABASE_URL.
      DATABASE_URL: ${{ secrets.DATABASE_URL_MIGRATE }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Use the project's canonical migrator (tsx db/migrate.ts via db:migrate).
      # It applies db/migrations in journal order, INCLUDING the hand-authored
      # RLS policy migration that drizzle-kit cannot model in TS. `drizzle-kit
      # migrate` would also work but db:migrate is the established command.
      - name: Apply migrations
        run: pnpm db:migrate

  smoke:
    name: Production smoke
    runs-on: ubuntu-latest
    needs: migrate
    env:
      PREVIEW_URL: https://tendr-app-red.vercel.app
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
      SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # The Vercel deploy runs in parallel with this workflow, so the new build
      # may not be live yet. Poll the site until it responds before smoke-testing
      # (max ~2.5 min). We accept any HTTP response (even 401/302) — we only need
      # the new deployment to be serving, not a specific status.
      - name: Wait for deployment to be live
        run: |
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null --max-time 10 "$PREVIEW_URL"; then
              echo "Deployment is live."
              exit 0
            fi
            echo "Attempt $i: not live yet, retrying in 5s..."
            sleep 5
          done
          echo "Deployment did not become live in time." >&2
          exit 1

      - name: Run smoke test
        run: pnpm exec playwright test e2e/smoke.spec.ts --project=desktop-chromium

      # Optional alert: only fires if a webhook secret is configured. When the
      # secret is absent the step is skipped silently (empty URL -> no-op curl).
      - name: Alert on smoke failure
        if: failure()
        run: |
          if [ -n "${SMOKE_ALERT_WEBHOOK_URL}" ]; then
            curl -fsS -X POST -H 'Content-Type: application/json' \
              -d "{\"text\":\"Production smoke test FAILED on ${GITHUB_SHA}\"}" \
              "${SMOKE_ALERT_WEBHOOK_URL}" || true
          else
            echo "No SMOKE_ALERT_WEBHOOK_URL configured; skipping alert."
          fi
        env:
          SMOKE_ALERT_WEBHOOK_URL: ${{ secrets.SMOKE_ALERT_WEBHOOK_URL }}
