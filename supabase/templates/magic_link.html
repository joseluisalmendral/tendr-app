<!--
  Local magic-link template (F4 promotion flow).

  The DEFAULT template uses {{ .ConfirmationURL }}, which under the PKCE flow
  points at GoTrue's /auth/v1/verify endpoint and forwards a `code` to the
  redirect target. Our /auth/callback verifies with verifyOtp({ token_hash,
  type }), which needs `token_hash` + `type` in the query — NOT a PKCE `code`.

  This template emits {{ .TokenHash }} and type=email so the callback receives
  the contract it expects. This is LOCAL config; the REMOTE dashboard template
  must be updated by the user to match (out of code scope).
-->
<h2>Iniciá sesión en Tendr</h2>
<p>Hacé clic en el siguiente enlace para acceder a tu cuenta:</p>
<p>
  <a href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=email"
    >Acceder a Tendr</a
  >
</p>
<p>Si no solicitaste este correo, podés ignorarlo.</p>
